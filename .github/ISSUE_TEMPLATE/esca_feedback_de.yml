name: "Esca Agnellis: Rückmeldung (Deutsch)"
description: "Teile allgemeine Rückmeldung zur Esca-Betaversion."
title: "[Esca][DE][Feedback] "
labels:
  - "app:esca-agnellis"
  - "language:de"
  - "feedback"
body:
  - type: markdown
    attributes:
      value: |
        Diese Vorlage ist für Esca Agnellis 0.14.0 (versionCode 37, Paket com.k2040.escaagnellis).
        Bitte veröffentliche keine Sicherungs- oder Exportdateien, Ernährungs-, Fortschritts- oder Gesundheitsdaten, Geräteseriennummern, Kontoinformationen, privaten oder ungeschwärzten Protokolle, lokalen Dateipfade, identifizierenden Angaben oder ungeschwärzten Screenshots.
  - type: input
    id: app_version
    attributes:
      label: App-Version
      placeholder: "0.14.0"
    validations:
      required: true
  - type: input
    id: version_code
    attributes:
      label: versionCode
      placeholder: "37"
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Android-Version
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Erfassungsablauf
        - Portionen
        - Datensicherung
        - Theme und Lesbarkeit
        - Installation oder Aktualisierung
        - Sonstiges
    validations:
      required: true
  - type: textarea
    id: worked
    attributes:
      label: Was hat gut funktioniert?
    validations:
      required: true
  - type: textarea
    id: confusing
    attributes:
      label: Was war unklar?
  - type: textarea
    id: suggestion
    attributes:
      label: Verbesserungsvorschlag
  - type: dropdown
    id: blocker
    attributes:
      label: Blockiert dies den Test?
      options:
        - Nein
        - Teilweise
        - Ja
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Datenschutzbestätigung
      options:
        - label: "Ich habe keine Sicherungs- oder Exportdateien, Ernährungs-, Fortschritts- oder Gesundheitsdaten, Geräteseriennummern, Kontoinformationen, lokalen Dateipfade oder identifizierenden Angaben angehängt."
          required: true
        - label: "Falls ich Screenshots oder Protokolle angehängt habe, wurden sie geprüft, vollständig geschwärzt und enthalten keine persönlichen oder sensiblen Informationen."
          required: true
