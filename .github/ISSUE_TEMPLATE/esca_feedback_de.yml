name: "Esca Agnellis: Rückmeldung (Deutsch)"
description: "Teile allgemeine Rückmeldung zur Esca-Betaversion."
title: "[Esca][DE][Feedback] "
labels:
  - "app:esca-agnellis"
  - "language:de"
  - "feedback"
body:
  - type: markdown
    attributes:
      value: |
        Bitte veröffentliche keine Sicherungsdateien, Ernährungs- oder Gesundheitsdaten, privaten Protokolle oder ungeschwärzten Screenshots.
  - type: input
    id: app_version
    attributes:
      label: App-Version
      placeholder: "0.14.0"
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Android-Version
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Erfassungsablauf
        - Portionen
        - Datensicherung
        - Theme und Lesbarkeit
        - Installation oder Aktualisierung
        - Sonstiges
    validations:
      required: true
  - type: textarea
    id: worked
    attributes:
      label: Was hat gut funktioniert?
    validations:
      required: true
  - type: textarea
    id: confusing
    attributes:
      label: Was war unklar?
  - type: textarea
    id: suggestion
    attributes:
      label: Verbesserungsvorschlag
  - type: dropdown
    id: blocker
    attributes:
      label: Blockiert dies den Test?
      options:
        - Nein
        - Teilweise
        - Ja
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Datenschutzbestätigung
      options:
        - label: "Ich habe keine Sicherungsdateien oder persönlichen/sensiblen Daten angehängt; beigefügte Screenshots wurden geprüft und geschwärzt."
          required: true
