name: "Esca Agnellis: Feedback (English)"
description: "Share general feedback about Esca Agnellis."
title: "[Esca][EN][Feedback] "
labels:
  - "app:esca-agnellis"
  - "language:en"
  - "feedback"
body:
  - type: markdown
    attributes:
      value: |
        This form is for Esca Agnellis 0.15.0 (versionCode 39, package com.k2040.escaagnellis).
        Do not publish backup or export files, nutrition, progress, or health data, device serial numbers, account details, private or unredacted logs, local file-system paths, identifying information, or unredacted screenshots.
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "0.15.0"
    validations:
      required: true
  - type: input
    id: version_code
    attributes:
      label: versionCode
      placeholder: "39"
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Android version
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Tracking flow
        - Portion reference
        - Backup and restore
        - Theme and readability
        - Language and translation
        - Installation or update
        - Other
    validations:
      required: true
  - type: textarea
    id: worked
    attributes:
      label: What worked well?
    validations:
      required: true
  - type: textarea
    id: confusing
    attributes:
      label: What was confusing?
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
  - type: dropdown
    id: blocker
    attributes:
      label: Does this affect normal use?
      options:
        - "No"
        - Partially
        - "Yes"
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: "I have not attached backup or export files, nutrition, progress, or health data, device serial numbers, account details, local file-system paths, or identifying information."
          required: true
        - label: "If I attached screenshots or logs, I reviewed and fully redacted them, and they contain no personal or sensitive information."
          required: true
